<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Conflict</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { width: 50%; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="date"], select, textarea { width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
        .error { color: red; font-size: 0.9em; margin-bottom: 10px; display: block; }
        button { background-color: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .back-link { display: inline-block; margin-top: 15px; text-decoration: none; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>Create New Conflict</h2>

    <form th:action="@{/web/conflicts}" th:object="${conflict}" method="post">

        <label for="name">Name:</label>
        <input type="text" id="name" th:field="*{name}" placeholder="Enter conflict name">
        <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name Error</span>

        <label for="startDate">Start Date:</label>
        <input type="date" id="startDate" th:field="*{startDate}">
        <span class="error" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}">Date Error</span>

        <label for="status">Status:</label>
        <select id="status" th:field="*{status}">
            <option value="" disabled selected>Select status</option>
            <option th:each="statusOption : ${statuses}"
                    th:value="${statusOption}"
                    th:text="${statusOption}">ACTIVE</option>
        </select>
        <span class="error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}">Status Error</span>

        <label for="description">Description:</label>
        <textarea id="description" th:field="*{description}" rows="4" placeholder="Enter description"></textarea>
        <span class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">Description Error</span>

        <button type="submit">Save Conflict</button>
    </form>

    <a href="/web/conflicts" class="back-link">← Back to List</a>
</div>

</body>
</html>
