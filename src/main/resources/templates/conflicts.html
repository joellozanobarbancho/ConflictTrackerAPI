<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Conflict Tracker - Conflicts List</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { width: 80%; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .action-link { text-decoration: none; color: white; padding: 5px 10px; border-radius: 4px; }
        .edit-btn { background-color: #4CAF50; }
        .delete-btn { background-color: #f44336; }
        .create-btn { display: inline-block; margin-top: 20px; background-color: #008CBA; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Conflicts List</h1>

    <a href="/web/conflicts/new" class="create-btn">Create New Conflict</a>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Start Date</th>
            <th>Status</th>
            <th>Description</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="conflict : ${conflicts}">
            <td th:text="${conflict.id}">1</td>
            <td th:text="${conflict.name}">World War I</td>
            <td th:text="${conflict.startDate}">1914-07-28</td>
            <td th:text="${conflict.status}">ENDED</td>
            <td th:text="${conflict.description}">A global war originating in Europe...</td>
            <td>
                <!-- For now, only delete is implemented as a direct link for simplicity -->
                <a th:href="@{/web/conflicts/delete/{id}(id=${conflict.id})}" class="action-link delete-btn" onclick="return confirm('Are you sure you want to delete this conflict?');">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
