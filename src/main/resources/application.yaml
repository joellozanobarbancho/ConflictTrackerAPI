spring:
  application:
    name: conflict-tracker-api

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:conflictdb
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  error:
    include-message: always
